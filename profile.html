<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>My Profile — HN Handicraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=30">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <nav class="nav-left">
        <a href="shop.html">Shop</a>
        <a href="index.html">Home</a>
      </nav>
      <a href="index.html" class="logo-area">
        <div class="site-logo">HN <span>Handicraft</span></div>
      </a>
      <div class="nav-right">
        <a href="login.html" class="nav-icon" aria-label="Account" data-auth="guest" data-icon="user"></a>
        <a href="profile.html" class="nav-icon" aria-label="My Profile" data-auth="user" style="display:none" data-icon="user"></a>
        <button type="button" class="nav-icon nav-icon-logout" aria-label="Logout" data-auth="logged-in" style="display:none" data-icon="logout" onclick="logout()"></button>
        <a href="admin.html" class="nav-icon nav-icon-admin" aria-label="Admin Panel" data-auth="admin" style="display:none" data-icon="admin"></a>
        <a href="cart.html" class="nav-icon" aria-label="Cart" data-icon="cart">
          <span class="cart-count" style="display:none">0</span>
        </a>
        <button class="mobile-menu-btn" aria-label="Menu" data-icon="menu"></button>
      </div>
    </div>
  </header>

  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">Home</a> / My Profile</p>
      <h1>My Profile</h1>
    </div>
  </div>

  <div class="container profile-page">
    <div id="profile-notifications"></div>

    <div class="profile-header-card">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div class="profile-header-info">
        <h2 id="profile-name"></h2>
        <p id="profile-email"></p>
        <p class="profile-meta" id="profile-member-since"></p>
      </div>
    </div>

    <div class="profile-stats-row">
      <div class="profile-stat-card">
        <span class="profile-stat-num" id="profile-order-count">0</span>
        <span class="profile-stat-label">Total Orders</span>
      </div>
      <div class="profile-stat-card">
        <span class="profile-stat-num" id="profile-address-count">0</span>
        <span class="profile-stat-label">Saved Addresses</span>
      </div>
      <div class="profile-stat-card">
        <span class="profile-stat-num" id="profile-login-count">0</span>
        <span class="profile-stat-label">Total Logins</span>
      </div>
    </div>

    <section class="profile-section" id="addresses">
      <div class="profile-section-header">
        <h3>My Addresses</h3>
        <button type="button" class="btn btn-outline-accent btn-sm" id="toggle-address-form">+ Add Address</button>
      </div>
      <div id="addresses-list" class="addresses-list"></div>
      <div class="address-form-card hidden" id="address-form-card">
        <h4 id="address-form-title">Add New Address</h4>
        <form id="address-form">
          <div class="form-row">
            <div class="form-group">
              <label for="addr-fullName">Full Name *</label>
              <input type="text" id="addr-fullName" required>
            </div>
            <div class="form-group">
              <label for="addr-phone">Phone *</label>
              <input type="tel" id="addr-phone" maxlength="10" required>
            </div>
          </div>
          <div class="form-group">
            <label for="addr-pincode">Pincode *</label>
            <div class="pincode-row">
              <input type="text" id="addr-pincode" maxlength="6" inputmode="numeric" required>
              <button type="button" class="btn btn-outline-accent btn-sm" id="addr-verify-pincode">Verify</button>
            </div>
            <p class="form-error" id="addr-pincode-error"></p>
            <div class="pincode-verified" id="addr-pincode-verified" style="display:none;"></div>
          </div>
          <div class="form-group">
            <label for="addr-apartment">Apartment / House No. *</label>
            <input type="text" id="addr-apartment" required>
          </div>
          <div class="form-group">
            <label for="addr-lane">Street / Lane / Area *</label>
            <input type="text" id="addr-lane" required>
          </div>
          <div class="form-group">
            <label for="addr-landmark">Landmark</label>
            <input type="text" id="addr-landmark">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="addr-city">City</label>
              <input type="text" id="addr-city" readonly>
            </div>
            <div class="form-group">
              <label for="addr-state">State</label>
              <input type="text" id="addr-state" readonly>
            </div>
          </div>
          <label class="admin-checkbox">
            <input type="checkbox" id="addr-default" checked> Set as default address
          </label>
          <div class="address-form-actions">
            <button type="submit" class="btn btn-primary">Save Address</button>
            <button type="button" class="btn btn-secondary" id="cancel-address-form">Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <section class="profile-section" id="orders">
      <div class="profile-section-header">
        <h3>Order History</h3>
      </div>
      <div id="orders-content" class="orders-list"></div>
    </section>
  </div>


  <footer class="site-footer" data-site-footer></footer>

  <a href="https://wa.me/918273038804" class="whatsapp-fab" data-whatsapp-link target="_blank" rel="noopener" aria-label="WhatsApp" data-icon="whatsapp"></a>

  <nav class="mobile-nav" aria-hidden="true">
    <button class="mobile-nav-close" aria-label="Close" data-icon="close"></button>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="profile.html" data-auth="user" style="display:none">My Profile</a>
    <a href="admin.html" data-auth="admin" style="display:none">Admin Panel</a>
    <a href="cart.html">Cart</a>
    <a href="login.html" data-auth="guest">Login</a>
    <a href="#" onclick="logout(); return false;" data-auth="logged-in" style="display:none">Logout</a>
  </nav>

  <script src="js/site-sync.js"></script>
  <script src="js/config.js?v=3"></script>
  <script src="js/products.js"></script>
  <script src="js/content.js"></script>
  <script src="js/icons.js?v=3"></script>
  <script src="js/auth.js?v=31"></script>
  <script src="js/cart.js?v=31"></script>
  <script src="js/checkout.js"></script>
  <script src="js/app.js?v=30"></script>
  <script src="js/site-boot.js"></script>
  <script>
    let addrPincodeData = null;
    let editingAddressId = null;
    let returnOrderId = null;
    let returnImages = [];

    function renderProfileHeader(user) {
      const orders = getUserOrders(user.email);
      const addresses = getUserAddresses(user.email);
      const memberDate = user.createdAt
        ? new Date(user.createdAt).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })
        : '—';

      document.getElementById('profile-avatar').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-email').textContent = user.email;
      document.getElementById('profile-member-since').textContent = 'Member since ' + memberDate;
      document.getElementById('profile-order-count').textContent = orders.length;
      document.getElementById('profile-address-count').textContent = addresses.length;
      document.getElementById('profile-login-count').textContent = user.loginCount || 0;
    }

    function renderNotifications(email) {
      const notes = getUserNotifications(email).filter(n => !n.read);
      const el = document.getElementById('profile-notifications');
      if (!notes.length) { el.innerHTML = ''; return; }
      el.innerHTML = notes.map(n => `
        <div class="user-notification ${n.type}" data-note-id="${n.id}">
          <p>${n.message}</p>
          <button type="button" class="notification-dismiss" data-note-id="${n.id}">Dismiss</button>
        </div>
      `).join('');
      el.querySelectorAll('.notification-dismiss').forEach(btn => {
        btn.addEventListener('click', () => {
          markNotificationRead(email, btn.dataset.noteId);
          renderProfile();
        });
      });
    }

    function renderAddressList() {
      const user = getCurrentUser();
      const container = document.getElementById('addresses-list');
      const addresses = getUserAddresses(user.email);

      if (addresses.length === 0) {
        container.innerHTML = '<p class="admin-empty">No saved addresses yet.</p>';
        return;
      }

      container.innerHTML = addresses.map(addr => `
        <div class="address-card" data-id="${addr.id}">
          <div class="address-card-body">
            <strong>${addr.fullName}</strong>
            ${addr.isDefault ? '<span class="address-default-badge">Default</span>' : ''}
            <p>${addr.apartment}, ${addr.lane}${addr.landmark ? ', ' + addr.landmark : ''}</p>
            <p>${addr.area ? addr.area + ', ' : ''}${addr.city}, ${addr.state} — ${addr.pincode}</p>
            <p>Phone: ${addr.phone}</p>
          </div>
          <div class="address-card-actions">
            <button type="button" class="btn btn-outline-accent btn-sm address-edit-btn">Edit</button>
            <button type="button" class="btn btn-secondary btn-sm address-delete-btn">Delete</button>
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.address-delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.closest('.address-card').dataset.id;
          if (confirm('Delete this address?')) {
            deleteUserAddress(user.email, id);
            renderProfile();
            showToast('Address deleted.');
          }
        });
      });

      container.querySelectorAll('.address-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.closest('.address-card').dataset.id;
          const addr = getUserAddresses(user.email).find(a => a.id === id);
          if (addr) {
            fillAddressForm(addr);
            document.getElementById('address-form-card').classList.remove('hidden');
          }
        });
      });
    }

    function fillAddressForm(addr) {
      editingAddressId = addr.id;
      document.getElementById('address-form-title').textContent = 'Edit Address';
      document.getElementById('addr-fullName').value = addr.fullName;
      document.getElementById('addr-phone').value = addr.phone;
      document.getElementById('addr-pincode').value = addr.pincode;
      document.getElementById('addr-apartment').value = addr.apartment;
      document.getElementById('addr-lane').value = addr.lane;
      document.getElementById('addr-landmark').value = addr.landmark || '';
      document.getElementById('addr-city').value = addr.city;
      document.getElementById('addr-state').value = addr.state;
      document.getElementById('addr-default').checked = !!addr.isDefault;
      addrPincodeData = { pincode: addr.pincode, city: addr.city, state: addr.state, area: addr.area || '' };
      document.getElementById('addr-pincode-verified').innerHTML = `${getIcon('check')} ${addr.area ? addr.area + ', ' : ''}${addr.city}, ${addr.state}`;
      document.getElementById('addr-pincode-verified').style.display = 'flex';
    }

    function resetAddressForm() {
      editingAddressId = null;
      document.getElementById('address-form-title').textContent = 'Add New Address';
      document.getElementById('address-form').reset();
      addrPincodeData = null;
      document.getElementById('addr-pincode-verified').style.display = 'none';
      document.getElementById('addr-pincode-error').classList.remove('visible');
    }

    function getTrackingSteps(order) {
      const status = order.status === 'pending' ? 'confirmed' : order.status;
      const steps = [
        { label: 'Received' },
        { label: 'Dispatched' },
        { label: 'Shipped' },
        { label: 'Delivered' }
      ];
      const orderFlow = ['confirmed', 'dispatched', 'shipped', 'delivered'];
      const currentIndex = orderFlow.indexOf(status);
      return steps.map((step, i) => ({ label: step.label, completed: i <= currentIndex }));
    }

    function renderOrders() {
      const user = getCurrentUser();
      const orders = getUserOrders(user.email);
      const container = document.getElementById('orders-content');
      const labels = getCategoryLabels();

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="cart-empty" style="padding:40px 0;">
            <h2>No orders yet</h2>
            <p style="color:#666;margin-bottom:24px;">Your order history will appear here</p>
            <a href="shop.html" class="btn btn-primary">Shop Now</a>
          </div>`;
        return;
      }

      const currentOrders = orders.filter(o => normalizeOrderStatus(o.status) !== 'delivered');
      const oldOrders = orders.filter(o => normalizeOrderStatus(o.status) === 'delivered');

      const renderOrderCard = (order) => {
        const date = new Date(order.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        const status = order.status === 'pending' ? 'confirmed' : order.status;
        const steps = getTrackingSteps(order);

        const itemsHtml = order.items.map(item => {
          let returnActionHtml = '';
          if (normalizeOrderStatus(order.status) === 'delivered') {
            const allReturns = getReturns();
            const itemReturn = allReturns.find(r => r.orderId === order.id && r.productId === item.productId);
            
            if (!itemReturn) {
              returnActionHtml = `
                <button type="button" class="btn btn-outline-accent btn-xs return-product-btn" 
                  data-order-id="${order.id}" 
                  data-product-id="${item.productId}" 
                  style="padding: 4px 8px; font-size: 0.72rem; cursor: pointer; border-radius: 4px; border: 1px solid var(--color-accent); color: var(--color-accent); background: none; margin-top: 6px;">
                  Return Product
                </button>`;
            } else if (itemReturn.status === 'pending') {
              returnActionHtml = `
                <span style="padding: 3px 6px; font-size: 0.7rem; font-weight: 600; color: #e65100; background: #fff3e0; border-radius: 4px; border: 1px solid #ffe0b2; margin-top: 6px; display: inline-block;">
                  Return Pending
                </span>`;
            } else if (itemReturn.status === 'approved') {
              returnActionHtml = `
                <span style="padding: 4px 8px; font-size: 0.72rem; font-weight: 600; color: #2e7d32; background: #e8f5e9; border-radius: 4px; border: 1px solid #c8e6c9; margin-top: 6px; display: inline-block; text-align: right; line-height: 1.2;">
                  Return Approved:<br>
                  <span style="font-size: 0.65rem; font-weight: normal; color: #444;">We will initiate your refund</span>
                </span>`;
            } else if (itemReturn.status === 'rejected') {
              returnActionHtml = `
                <span style="padding: 4px 8px; font-size: 0.72rem; font-weight: 600; color: #c62828; background: #ffebee; border-radius: 4px; border: 1px solid #ffcdd2; margin-top: 6px; display: inline-block; text-align: right; line-height: 1.2;">
                  Return Rejected:<br>
                  <span style="font-size: 0.65rem; font-weight: normal; color: #444;">Sorry, we can't accept your return request</span>
                </span>`;
            }
          }

          return `
            <div class="order-product-link ${item.unavailable ? 'item-unavailable' : ''}" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; text-decoration: none;">
              <a href="product.html?id=${item.productId}" style="display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; flex: 1; min-width: 0;">
                <img src="${item.image}" alt="${item.name}">
                <div class="info">
                  <h4>${item.name}</h4>
                  <p>${item.productCode || item.productId} · Qty: ${item.quantity}</p>
                  ${item.unavailable ? '<span class="item-unavailable-tag">Not Available</span>' : ''}
                </div>
              </a>
              <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center; margin-left: 12px; min-width: 120px;">
                <span class="price">${formatPrice(item.price * item.quantity)}</span>
                ${returnActionHtml}
              </div>
            </div>`;
        }).join('');

        const address = order.addressDetails
          ? `${order.addressDetails.fullName}, ${order.addressDetails.apartment}, ${order.addressDetails.lane}, ${order.addressDetails.city} — ${order.addressDetails.pincode}`
          : order.shippingAddress;

        return `
          <div class="order-card">
            <div class="order-header">
              <div>
                <span class="order-id">${order.id}</span>
                <span style="color:#999;font-size:0.82rem;margin-left:12px;">${date}</span>
              </div>
              <span class="order-status status-${status}">${getOrderStatusLabel(status)}</span>
            </div>
            <div class="order-product-list">${itemsHtml}</div>
            <p class="order-total">Total: ${formatPrice(order.total)} · <span style="font-weight:normal;color:#666;">Payment: ${order.paymentMethod || 'COD'}</span></p>
            ${order.paymentId ? `<p style="font-size:0.75rem;color:#888;margin-top:2px;">Payment ID: <code>${order.paymentId}</code></p>` : ''}
            <p style="font-size:0.82rem;color:#999;margin-top:8px;">Ship to: ${address}</p>
            <div class="order-tracking">${steps.map(s => `
              <div class="tracking-step ${s.completed ? 'completed' : ''}">
                <div class="tracking-dot">${s.completed && s.label !== 'Received' ? '✓' : ''}</div>
                <span>${s.label}</span>
              </div>`).join('')}</div>
          </div>`;
      };

      const currentHtml = currentOrders.length > 0
        ? currentOrders.map(renderOrderCard).join('')
        : '<p class="admin-empty" style="text-align:center;padding:20px;color:#888;">No active current orders.</p>';

      const oldHtml = oldOrders.length > 0
        ? oldOrders.map(renderOrderCard).join('')
        : '<p class="admin-empty" style="text-align:center;padding:20px;color:#888;">No past orders.</p>';

      container.innerHTML = `
        <div class="current-orders-list">
          ${currentHtml}
        </div>
        ${oldOrders.length > 0 ? `
          <div class="old-orders-section" style="margin-top: 30px; text-align: center;">
            <button type="button" class="btn btn-outline-accent btn-sm" id="toggle-old-orders-btn" style="padding: 10px 24px; font-size: 0.9rem; cursor: pointer;">
              Recent Orders (${oldOrders.length})
            </button>
            <div id="old-orders-container" class="hidden" style="margin-top: 24px; text-align: left;">
              ${oldHtml}
            </div>
          </div>
        ` : ''}
      `;

      // Toggle old orders visibility
      const toggleBtn = document.getElementById('toggle-old-orders-btn');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const oldContainer = document.getElementById('old-orders-container');
          oldContainer.classList.toggle('hidden');
          if (oldContainer.classList.contains('hidden')) {
            toggleBtn.textContent = `Recent Orders (${oldOrders.length})`;
          } else {
            toggleBtn.textContent = `Hide Recent Orders`;
          }
        });
      }

      container.querySelectorAll('.return-product-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `return.html?orderId=${btn.dataset.orderId}&productId=${btn.dataset.productId}`;
        });
      });
      initIcons();
    }

    function renderProfile() {
      const user = getCurrentUser();
      renderProfileHeader(user);
      renderNotifications(user.email);
      renderAddressList();
      renderOrders();
      document.getElementById('profile-address-count').textContent = getUserAddresses(user.email).length;
      document.getElementById('profile-order-count').textContent = getUserOrders(user.email).length;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (window.__siteStoreReady) await window.__siteStoreReady;
      if (!requireAuth('login.html?redirect=profile.html')) return;
      updateAuthUI();
      updateCartCount();
      renderProfile();

      const hash = window.location.hash;
      if (hash === '#addresses' || new URLSearchParams(window.location.search).get('new') === '1') {
        document.getElementById('address-form-card').classList.remove('hidden');
        document.getElementById('addresses').scrollIntoView({ behavior: 'smooth' });
      }
      if (hash === '#orders') {
        document.getElementById('orders').scrollIntoView({ behavior: 'smooth' });
      }

      document.getElementById('toggle-address-form').addEventListener('click', () => {
        const form = document.getElementById('address-form-card');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) {
          resetAddressForm();
          form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });

      document.getElementById('cancel-address-form').addEventListener('click', () => {
        document.getElementById('address-form-card').classList.add('hidden');
        resetAddressForm();
      });

      document.getElementById('addr-verify-pincode').addEventListener('click', async () => {
        const pincode = document.getElementById('addr-pincode').value.trim();
        const errorEl = document.getElementById('addr-pincode-error');
        const verifiedEl = document.getElementById('addr-pincode-verified');
        errorEl.classList.remove('visible');
        verifiedEl.style.display = 'none';
        const result = await verifyPincode(pincode);
        if (result.valid) {
          addrPincodeData = result.data;
          document.getElementById('addr-city').value = result.data.city;
          document.getElementById('addr-state').value = result.data.state;
          verifiedEl.innerHTML = `${getIcon('check')} Verified: ${result.data.area}, ${result.data.city}, ${result.data.state}`;
          verifiedEl.style.display = 'flex';
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.add('visible');
        }
      });

      document.getElementById('address-form').addEventListener('submit', (e) => {
        e.preventDefault();
        if (!addrPincodeData) { showToast('Please verify your pincode first.'); return; }
        const user = getCurrentUser();
        saveUserAddress(user.email, {
          id: editingAddressId,
          fullName: document.getElementById('addr-fullName').value.trim(),
          phone: document.getElementById('addr-phone').value.trim(),
          apartment: document.getElementById('addr-apartment').value.trim(),
          lane: document.getElementById('addr-lane').value.trim(),
          landmark: document.getElementById('addr-landmark').value.trim(),
          city: document.getElementById('addr-city').value.trim(),
          state: document.getElementById('addr-state').value.trim(),
          pincode: document.getElementById('addr-pincode').value.trim(),
          area: addrPincodeData.area,
          isDefault: document.getElementById('addr-default').checked
        });
        showToast('Address saved!');
        document.getElementById('address-form-card').classList.add('hidden');
        resetAddressForm();
        renderProfile();
      });



      setInterval(renderProfile, 10000);
    });
  </script>
</body>
</html>
