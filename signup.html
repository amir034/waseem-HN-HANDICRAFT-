<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>Sign Up — HN Handicraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body class="auth-page">

  <header class="site-header">
    <div class="container header-inner">
      <nav class="nav-left">
        <a href="shop.html">Shop</a>
        <a href="index.html">Home</a>
      </nav>
      <a href="index.html" class="logo-area">
        <div class="site-logo">HN <span>Handicraft</span></div>
      </a>
      <div class="nav-right">
        <a href="cart.html" class="nav-icon" data-icon="cart">
          <span class="cart-count" style="display:none">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Sign up to track your handicraft orders</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Confirm your password" required>
        </div>
        <p class="form-error" id="signup-error"></p>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <footer class="site-footer" data-site-footer></footer>

  <a href="https://wa.me/918273038804" class="whatsapp-fab" data-whatsapp-link target="_blank" rel="noopener" aria-label="WhatsApp" data-icon="whatsapp"></a>

  <script src="js/config.js"></script>
  <script src="js/products.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateCartCount();

      if (isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('signup-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const errorEl = document.getElementById('signup-error');

        if (password !== confirm) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.classList.add('visible');
          return;
        }

        const result = signup(name, email, password);
        if (result.success) {
          setWelcomeMessage(name);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.add('visible');
        }
      });
    });
  </script>
</body>
</html>
